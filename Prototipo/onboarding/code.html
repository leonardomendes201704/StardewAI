            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-glass {
            background: rgba(37, 37, 49, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body overflow-hidden">
<!-- High-Impact Background -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/40 to-transparent z-10"></div>
<img class="w-full h-full object-cover" data-alt="vibrant nightlife scene with a blurred crowd at a concert under dramatic cyan and magenta stage lighting with deep shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3zvm_r3VOxj3V4yI0hu1DdeuHKHWRtZGdxPWWOTWWyAF8seNCs5Y_FQ9MGwRp7SYCl4PjRn19uwIEwDyO1dZ-825oTm8b7BsiQiA3ZwZnBSBoru89s2YQCDsJbaX7zU_UGn3yKllTTrE14eS3jZQeoUspQdChc18dr6G7W1WewQ9rNrwp6TvDrhZ5ZXkmscMArfPubCs4NADSsW4G3dzFXGiVLYDPt0mvcUbiV4_G1khgL61JDJNpvwROvnvaZJXZskYxrrhGl6hs"/>
</div>
<!-- Main Content Canvas -->
<main class="relative z-20 min-h-screen flex flex-col items-center justify-center px-6 py-12">
<!-- Brand Identity Section -->
<header class="text-center mb-12">
<h1 class="font-headline text-5xl md:text-7xl font-extrabold tracking-tighter text-primary mb-4 drop-shadow-2xl">
                PalcoJá
            </h1>
<p class="font-body text-on-surface-variant text-lg md:text-xl max-w-md mx-auto">
                Conectando o som certo ao palco ideal.
            </p>
</header>
<!-- Profile Selection Grid -->
<div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Establishment Card -->
<button class="group relative flex flex-col items-center text-left p-8 rounded-[2rem] bg-glass border border-outline-variant/15 transition-all duration-300 hover:scale-[1.02] active:scale-95">
<div class="w-20 h-20 mb-6 rounded-2xl bg-secondary/10 flex items-center justify-center text-secondary group-hover:bg-secondary group-hover:text-black transition-colors duration-300">
<span class="material-symbols-outlined text-4xl" data-icon="storefront">storefront</span>
</div>
<h2 class="font-headline text-2xl font-bold text-on-surface mb-2">
                    Sou um Estabelecimento
                </h2>
<p class="text-on-surface-variant text-sm leading-relaxed mb-8">
                    Pubs, bares e casas de show buscando a atração perfeita para sua noite.
                </p>
<div class="mt-auto flex items-center text-secondary font-semibold text-sm tracking-wider uppercase">
                    Começar agora
                    <span class="material-symbols-outlined ml-2 text-lg">arrow_forward</span>
</div>
<!-- Subtle glow effect on hover -->
<div class="absolute inset-0 rounded-[2rem] opacity-0 group-hover:opacity-100 transition-opacity duration-500 ring-2 ring-secondary/20 shadow-[0_0_40px_rgba(0,238,252,0.1)] pointer-events-none"></div>
</button>
<!-- Musician Card -->
<button class="group relative flex flex-col items-center text-left p-8 rounded-[2rem] bg-glass border border-outline-variant/15 transition-all duration-300 hover:scale-[1.02] active:scale-95">
<div class="w-20 h-20 mb-6 rounded-2xl bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-black transition-colors duration-300">
<span class="material-symbols-outlined text-4xl" data-icon="guitar">piano</span>
</div>
<h2 class="font-headline text-2xl font-bold text-on-surface mb-2">
                    Sou um Músico
                </h2>
<p class="text-on-surface-variant text-sm leading-relaxed mb-8">
                    Artistas e bandas prontos para dominar os melhores palcos da cidade.
                </p>
<div class="mt-auto flex items-center text-primary font-semibold text-sm tracking-wider uppercase">
                    Criar meu portfólio
                    <span class="material-symbols-outlined ml-2 text-lg">arrow_forward</span>
</div>
<!-- Subtle glow effect on hover -->
<div class="absolute inset-0 rounded-[2rem] opacity-0 group-hover:opacity-100 transition-opacity duration-500 ring-2 ring-primary/20 shadow-[0_0_40px_rgba(243,255,202,0.1)] pointer-events-none"></div>
</button>
</div>
<!-- Secondary CTA/Login link -->
<footer class="mt-12">
<p class="text-on-surface-variant font-medium">
                Já possui uma conta? 
                <a class="text-secondary hover:text-secondary-dim underline decoration-secondary/30 underline-offset-4 transition-colors" href="#">Entrar agora</a>
</p>
</footer>
</main>
<!-- Asymmetric Decorative Elements -->
<div class="fixed top-[-10%] right-[-5%] w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[120px] pointer-events-none z-10"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] pointer-events-none z-10"></div>
