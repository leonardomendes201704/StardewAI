<!DOCTYPE html>

<html class="dark" lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#000000",
                        "primary": "#f3ffca",
                        "error": "#ff6e84",
                        "on-tertiary-fixed": "#1c0055",
                        "on-background": "#f2effb",
                        "primary-fixed-dim": "#beee00",
                        "on-surface": "#f2effb",
                        "inverse-primary": "#516700",
                        "background": "#0d0d16",
                        "primary-fixed": "#cafd00",
                        "inverse-on-surface": "#55545e",
                        "error-dim": "#d73357",
                        "secondary": "#00eefc",
                        "surface-container": "#191923",
                        "inverse-surface": "#fcf8ff",
                        "on-secondary": "#005359",
                        "on-secondary-fixed": "#003f43",
                        "surface-container-high": "#1f1f2a",
                        "on-error": "#490013",
                        "tertiary": "#a68cff",
                        "tertiary-dim": "#7e51ff",
                        "on-error-container": "#ffb2b9",
                        "primary-container": "#cafd00",
                        "on-tertiary-container": "#ffffff",
                        "primary-dim": "#beee00",
                        "tertiary-container": "#7c4dff",
                        "on-primary": "#516700",
                        "on-primary-fixed-variant": "#526900",
                        "on-tertiary": "#25006b",
                        "surface-container-low": "#13131c",
                        "secondary-fixed": "#00eefc",
                        "on-tertiary-fixed-variant": "#4000ad",
                        "on-primary-fixed": "#3a4a00",
                        "outline-variant": "#484751",
                        "surface-container-highest": "#252531",
                        "surface-variant": "#252531",
                        "surface-bright": "#2b2b38",
                        "surface": "#0d0d16",
                        "on-primary-container": "#4a5e00",
                        "surface-dim": "#0d0d16",
                        "error-container": "#a70138",
                        "on-secondary-container": "#e3fdff",
                        "surface-tint": "#f3ffca",
                        "on-secondary-fixed-variant": "#005e64",
                        "outline": "#76747f",
                        "secondary-container": "#006970",
                        "secondary-fixed-dim": "#00deec",
                        "secondary-dim": "#00deec",
                        "tertiary-fixed-dim": "#ab93ff",
                        "tertiary-fixed": "#b8a3ff",
                        "on-surface-variant": "#acaab5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Spline Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(25, 25, 35, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .neon-glow-focus:focus-within {
            box-shadow: 0 0 15px rgba(243, 255, 202, 0.15);
            border-color: #f3ffca;
        }
        body {
            background-color: #0d0d16;
            font-family: 'Manrope', sans-serif;
            color: #f2effb;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col justify-center items-center overflow-x-hidden p-6 relative">
<!-- Atmospheric Background Element -->
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[50%] h-[50%] rounded-full bg-secondary/5 blur-[100px]"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-md z-10">
<!-- Brand Header -->
<div class="text-center mb-10">
<div class="inline-block mb-8">
<span class="text-4xl font-black tracking-tighter text-primary font-headline">PalcoJá</span>
</div>
<h1 class="text-4xl font-extrabold font-headline tracking-tight text-on-surface mb-3">Bem-vindo de volta</h1>
<p class="text-on-surface-variant body-md font-medium max-w-[280px] mx-auto">
                Entre para encontrar o palco ou o som perfeito.
            </p>
</div>
<!-- Form Card -->
<div class="glass-panel p-8 rounded-xl space-y-6">
<form class="space-y-5" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative flex items-center group neon-glow-focus rounded-xl border border-outline-variant/30 transition-all duration-300 bg-surface-container-lowest">
<span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface focus:ring-0 placeholder:text-outline/50 rounded-xl" id="email" placeholder="nome@email.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Senha</label>
<a class="text-xs font-semibold text-primary/80 hover:text-primary transition-colors" href="#">Esqueceu a senha?</a>
</div>
<div class="relative flex items-center group neon-glow-focus rounded-xl border border-outline-variant/30 transition-all duration-300 bg-surface-container-lowest">
<span class="material-symbols-outlined absolute left-4 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-12 text-on-surface focus:ring-0 placeholder:text-outline/50 rounded-xl" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Login Action -->
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed font-black text-lg rounded-xl shadow-[0_4px_20px_rgba(243,255,202,0.2)] active:scale-[0.98] transition-all duration-200 mt-2" type="submit">
                    Entrar
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="text-[10px] font-bold text-outline uppercase tracking-[0.2em]">ou acesse com</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-1 gap-3">
<button class="flex items-center justify-center gap-3 w-full py-3.5 rounded-xl border border-outline-variant/30 hover:bg-surface-container-highest/50 active:scale-[0.98] transition-all">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#f2effb"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#f2effb"></path>
<path d="M5.84 14.09c-.22-.67-.35-1.39-.35-2.09s.13-1.42.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#f2effb"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#f2effb"></path>
</svg>
<span class="text-sm font-bold text-on-surface">Entrar com Google</span>
</button>
<button class="flex items-center justify-center gap-3 w-full py-3.5 rounded-xl border border-outline-variant/30 hover:bg-surface-container-highest/50 active:scale-[0.98] transition-all">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.06.75 1.21-.03 2.36-.74 3.74-.61 1.45.13 2.53.68 3.16 1.58-2.91 1.75-2.45 5.85.51 7.03-.61 1.52-1.39 3.13-2.47 4.22zM12.03 7.25c-.02-2.23 1.84-4.22 4.07-4.25.22 2.37-2.01 4.54-4.07 4.25z"></path>
</svg>
<span class="text-sm font-bold text-on-surface">Entrar com Apple</span>
</button>
</div>
</div>
<!-- Footer Links -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant font-medium">
                Não tem uma conta? 
                <a class="text-primary font-bold ml-1 hover:underline decoration-2 underline-offset-4" href="#">Cadastre-se</a>
</p>
</div>
</main>
<!-- Decorative Stage Element at the bottom -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-primary/20 blur-sm"></div>
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-1/2 h-[120px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
