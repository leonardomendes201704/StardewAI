<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StardewAI - Agent Orchestration</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
    }
    #game {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    /* Task delegation modal styles */
    .task-modal {
      background: #2a2a4a;
      border: 4px solid #8888cc;
      border-radius: 4px;
      padding: 16px;
      color: #ffffff;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      width: 400px;
    }
    .task-modal textarea {
      width: 100%;
      height: 80px;
      background: #1a1a2e;
      border: 2px solid #6666aa;
      color: #ffffff;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      padding: 8px;
      resize: none;
      outline: none;
      margin: 8px 0;
    }
    .task-modal textarea:focus {
      border-color: #aaaaff;
    }
    .task-modal button {
      background: #4444aa;
      border: 2px solid #6666cc;
      color: #ffffff;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      padding: 8px 16px;
      cursor: pointer;
      margin-right: 8px;
    }
    .task-modal button:hover {
      background: #5555bb;
    }
    .task-modal button.cancel {
      background: #663333;
      border-color: #884444;
    }
    .task-modal button.cancel:hover {
      background: #774444;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
